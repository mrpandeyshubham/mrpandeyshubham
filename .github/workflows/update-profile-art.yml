name: Update profile art

"on":
  schedule:
    - cron: "17 6 * * *"   # ~06:17 UTC daily
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  heatmap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r scripts/requirements.txt
      - run: python scripts/fetch_contributions.py
      - run: python scripts/render_heatmap_svg.py
      - run: python scripts/fetch_stats.py
      - run: python scripts/make_info_card.py
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh profile stats [skip ci]"
          file_pattern: "data/contributions.json data/stats.json contrib-heatmap.svg info-card.svg"
